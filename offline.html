<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Életadmin – Nincs kapcsolat</title>
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192x192.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #111827;
            color: #f9fafb;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            text-align: center;
            padding: 2rem;
        }
        .icon { font-size: 4rem; margin-bottom: 1.5rem; opacity: 0.6; }
        h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.75rem; }
        p { color: #9ca3af; font-size: 0.95rem; line-height: 1.6; max-width: 300px; }
        button {
            margin-top: 2rem;
            padding: 0.75rem 2rem;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 0.75rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: #2563eb; }
    </style>
</head>
<body>
    <div class="icon">📡</div>
    <h1>Nincs internetkapcsolat</h1>
    <p>Az Életadmin alkalmazás nem érhető el offline módban. Kérjük, ellenőrizd az internetkapcsolatod, majd próbáld újra.</p>
    <button onclick="window.location.reload()">🔄 Újrapróbálkozás</button>
</body>
</html>
